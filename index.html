<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルなテキスト変換ツール</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        (function(){
            try {
                var saved = localStorage.getItem('theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = saved || (prefersDark ? 'dark' : 'light');
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark-mode');
                }
            } catch (e) {
                /* ignore */
            }
        })();
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="themeToggle" class="theme-toggle" aria-label="テーマ切り替え">🌙</button>
    <div class="container">
        <div class="hero">
            <h1>テキスト変換ツール</h1>
            <p class="hero-subtitle">シンプルで使いやすいテキスト整形ツール</p>
        </div>

        <label for="inputText">変換したいテキスト:</label>
        <textarea id="inputText" rows="10" placeholder="ここにテキストを入力してください"></textarea>

        <label for="conversionType">変換の種類を選択:</label>
        <select id="conversionType">
            <option value="" disabled selected hidden>変換機能を選択してください</option>
            <optgroup label="💻 コードブロック化 (AI自動判定)">
                <option value="codeBlockAuto">コードブロック (自動判定)</option>
                <option value="codeBlockMarkdown">コードブロック (markdown)</option>
                <option value="codeBlockJs">コードブロック (javascript)</option>
                <option value="codeBlockAhk">コードブロック (autohotkey)</option>
                <option value="codeBlockPython">コードブロック (python)</option>
                <option value="codeBlockGeneric">コードブロック (汎用)</option>
            </optgroup>
            <optgroup label="✍️ テキスト整形・Markdownリスト化">
                <option value="markdownGeminiFix">Markdown修正 (Gemini用)</option>
                <option value="geminiNewlineFix">Gemini改行修正</option>
                <option value="adjustKagikakko">括弧のネスト自動調整 (「」と『』)</option>
                <option value="markdownQuote">Markdown引用 (>)</option>
                <option value="quoteAndHalfwidthSpace">半角スペース統一 ＋ 引用 (>)</option>
                <option value="markdownBulletList">Markdown箇条書き (*)</option>
                <option value="markdownNumberedList">Markdown番号付きリスト</option>
            </optgroup>
            <optgroup label="🔄 空白・改行の変換">
                <option value="stripTrailingWhitespace">行末の空白削除</option>
                <option value="trimWhitespace">行頭の空白削除</option>
                <option value="spaceToFullwidth">半角スペース ➔ 全角統一</option>
                <option value="spaceToHalfwidth">全角スペース ➔ 半角統一</option>
                <option value="newlinesToSlash">改行 ➔ " / " に変換</option>
                <option value="newlinesToSpace">改行 ➔ 半角スペースに変換</option>
            </optgroup>
        </select>


        <!-- 🚀 統合操作パネル (コントロールエリア) -->
        <div class="control-panel">
            <div class="main-actions">
                <button id="convertAndCopyButton" class="btn-primary">[B] 変換してコピー</button>
                <button id="pasteAndConvertButton" class="btn-success">[A+B] 貼り付けて一発実行</button>
            </div>
            <button id="pasteButton" class="btn-secondary">[A] クリップボードから貼り付け</button>
        </div>

        <label for="outputText">変換結果 (自動コピーされます):</label>
        <textarea id="outputText" rows="10" readonly></textarea>
    </div>

<!-- 固定フッターステータスバー -->
<div class="status-bar">
    <span>⚠️ AI自動判定はPuterおよび外部AI APIを利用しています。判定結果の正確性は保証されません。本ツールは技術検証・実験用途を含みます。</span>
</div>

    <!-- 同意確認モーダル -->
    <div id="consentModal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <span class="shield-icon">🛡️</span>
                <h2>AI自動判定の確認</h2>
            </div>
            <div class="modal-body">
                <p>「コードブロック (自動判定)」を利用する際、言語判定のため入力内容が外部AIプロバイダ（PuterおよびOpenAI等）のサーバーへ送信されます。よろしいですか？</p>
                <p class="modal-subtext">※同意すると、この設定はCookieに1年間保存され、次回以降の確認が省略されます。</p>
            </div>
            <div class="modal-footer">
                <button id="consentCancelBtn" class="btn-secondary">キャンセル</button>
                <button id="consentApproveBtn" class="btn-primary">同意して実行</button>
            </div>
        </div>
    </div>

    <script src="ai-detector.js"></script>
    <script src="script.js"></script>
</body>

</html>
